const factionColors = { allied: "#4ade80", neutral: "#facc15", hostile: "#f87171", unknown: "#9ca3af" };
const statusColor   = s => s === "alive" ? "#4ade80" : s === "dead" ? "#f87171" : "#facc15";

// Build initial node positions — radial layout like the PDF
// Strahd at center, regions placed in arcs around him
function buildInitialPositions(npcs, locations, categories, centerId = "strahd") {
  const W = 2800, H = 2200, CX = W / 2, CY = H / 2;
  const positions = {};

  // Darklord center
  positions[centerId] = { x: CX, y: CY };

  // Group NPCs by category
  const catGroups = {};
  categories.forEach(cat => { catGroups[cat.id] = []; });
  npcs.filter(n => n.id !== centerId).forEach(n => {
    const loc = locations.find(l => l.id === n.location);
    const catId = loc?.category || "wilds";
    if (catGroups[catId]) catGroups[catId].push(n);
  });

  // Place categories in arcs — match PDF layout roughly
  const catAngles = {
    barovia_proper: -Math.PI * 0.75,
    vallaki_region: -Math.PI * 0.1,
    krezk_region:   Math.PI * 0.35,
    wilds:           Math.PI * 0.75,
    vistani:         Math.PI * 1.1,
    dementlieu_city_region: -Math.PI * 0.45,
  };

  const RING1 = 420, RING2 = 750;

  categories.forEach(cat => {
    const group = catGroups[cat.id] || [];
    if (!group.length) return;
    const baseAngle = catAngles[cat.id] || 0;
    const spread = Math.min(Math.PI * 0.55, group.length * 0.18);

    group.forEach((npc, i) => {
      const t = group.length === 1 ? 0 : (i / (group.length - 1) - 0.5);
      const angle = baseAngle + t * spread;
      // inner ring for "important" NPCs (with many relationships), outer for minor
      const ring = i < Math.ceil(group.length / 2) ? RING1 : RING2;
      positions[npc.id] = {
        x: CX + Math.cos(angle) * ring,
        y: CY + Math.sin(angle) * ring,
      };
    });
  });

  return positions;
}

function Btn({ children, onClick, color = "#b45309", small }) {
  const [h, setH] = useState(false);
  return (
    <button onClick={onClick} onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)}
      style={{ background: h ? `${color}30` : `${color}16`, border: `1px solid ${color}66`, color, borderRadius: 4, cursor: "pointer", padding: small ? "4px 10px" : "7px 16px", fontSize: small ? 11 : 13, transition: "background 0.12s", whiteSpace: "nowrap" }}>
      {children}
    </button>
  );
}

function Field({ label, children }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 5, flex: "1 1 180px" }}>
      {label && <label style={{ fontSize: 10, color: "#9ca3af", letterSpacing: 3, textTransform: "uppercase" }}>{label}</label>}
      {children}
    </div>
  );
}

function Modal({ title, onClose, children }) {
  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, zIndex: 200, background: "rgba(0,0,0,0.82)", backdropFilter: "blur(4px)", display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
      <div onClick={e => e.stopPropagation()} style={{ background: "#0f0608", border: "1px solid rgba(180,100,50,0.45)", borderRadius: 10, padding: "26px 30px", width: "100%", maxWidth: 540, maxHeight: "88vh", overflowY: "auto" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 22 }}>
          <h2 style={{ margin: 0, fontSize: 17, color: "#e8d5c4", fontWeight: 400, letterSpacing: 1 }}>{title}</h2>
          <button onClick={onClose} style={{ background: "none", border: "none", color: "#9ca3af", fontSize: 20, cursor: "pointer" }}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

// ── NODE MAP ──────────────────────────────────────────────────────────────────
function NodeMap({ npcs, locations, categories, relationships, customStatus, notes, onSelectNPC, filterFaction, filterCategory, filterDomain, darklordId }) {
  const svgRef = useRef(null);
  const [positions, setPositions] = useState(() => buildInitialPositions(npcs, locations, categories, darklordId));

  // Re-layout when the Darklord changes
  useEffect(() => {
    setPositions(buildInitialPositions(npcs, locations, categories, darklordId));
  }, [darklordId]);
  const [dragging, setDragging] = useState(null);
  const [pan, setPan] = useState({ x: 0, y: 0 });
  const [zoom, setZoom] = useState(0.38);
  const [panning, setPanning] = useState(false);
  const panStart = useRef(null);
  const [tooltip, setTooltip] = useState(null);
  const [hoveredEdge, setHoveredEdge] = useState(null);

  const getStatus = npc => customStatus[npc.id] || npc.status;
  const locById = id => locations.find(l => l.id === id);
  const catById = id => categories.find(c => c.id === id);

  // Update positions when new NPCs added
  useEffect(() => {
    setPositions(prev => {
      const next = { ...prev };
      npcs.forEach(n => {
        if (!next[n.id]) {
          // Place near their location cluster
          const existing = npcs.filter(x => x.location === n.location && next[x.id]);
          if (existing.length) {
            const ref = next[existing[0].id];
            next[n.id] = { x: ref.x + (Math.random() - 0.5) * 120, y: ref.y + (Math.random() - 0.5) * 120 };
          } else {
            next[n.id] = { x: 1400 + (Math.random() - 0.5) * 400, y: 1100 + (Math.random() - 0.5) * 400 };
          }
        }
      });
      return next;
    });
  }, [npcs]);

  // Filtered node IDs
  const visibleIds = new Set(npcs.filter(n => {
    const loc = locById(n.location);
    const cat = loc ? catById(loc.category) : null;
    if (filterFaction !== "all" && n.faction !== filterFaction) return false;
    if (filterCategory !== "all" && loc?.category !== filterCategory) return false;
    if (filterDomain && filterDomain !== "all" && (cat?.domain || "barovia") !== filterDomain) return false;
    return true;
  }).map(n => n.id));

  // SVG coords from screen
  const toSVG = useCallback((clientX, clientY) => {
    const rect = svgRef.current?.getBoundingClientRect();
    if (!rect) return { x: 0, y: 0 };
    return {
      x: (clientX - rect.left - pan.x) / zoom,
      y: (clientY - rect.top - pan.y) / zoom,
    };
  }, [pan, zoom]);

  const onMouseDown = useCallback((e, npcId) => {
    e.stopPropagation();
    const svg = toSVG(e.clientX, e.clientY);
    setDragging({ id: npcId, ox: svg.x - positions[npcId].x, oy: svg.y - positions[npcId].y });
  }, [positions, toSVG]);

  const onSVGMouseDown = useCallback(e => {
    if (dragging) return;
    setPanning(true);
    panStart.current = { mx: e.clientX, my: e.clientY, px: pan.x, py: pan.y };
  }, [dragging, pan]);

  const onMouseMove = useCallback(e => {
    if (dragging) {
      const svg = toSVG(e.clientX, e.clientY);
      setPositions(p => ({ ...p, [dragging.id]: { x: svg.x - dragging.ox, y: svg.y - dragging.oy } }));
    } else if (panning && panStart.current) {
      setPan({ x: panStart.current.px + e.clientX - panStart.current.mx, y: panStart.current.py + e.clientY - panStart.current.my });
    }
  }, [dragging, panning, toSVG]);

  const onMouseUp = useCallback(() => { setDragging(null); setPanning(false); }, []);

  const onWheel = useCallback(e => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.1 : 0.91;
    setZoom(z => Math.max(0.12, Math.min(2, z * factor)));
  }, []);

  // Location cluster backgrounds
  const locClusters = {};
  npcs.forEach(n => {
    if (!visibleIds.has(n.id)) return;
    const pos = positions[n.id];
    if (!pos) return;
    if (!locClusters[n.location]) locClusters[n.location] = [];
    locClusters[n.location].push(pos);
  });

  const NODE_R = 36;

  return (
    <div style={{ position: "relative", width: "100%", height: "100%", background: "#070405", overflow: "hidden" }} onWheel={onWheel}>
      {/* Controls */}
      <div style={{ position: "absolute", top: 12, right: 12, zIndex: 10, display: "flex", flexDirection: "column", gap: 6 }}>
        <button onClick={() => setZoom(z => Math.min(2, z * 1.15))} style={{ width: 32, height: 32, background: "rgba(0,0,0,0.7)", border: "1px solid rgba(180,100,50,0.4)", color: "#e8d5c4", borderRadius: 4, cursor: "pointer", fontSize: 18 }}>+</button>
        <button onClick={() => setZoom(z => Math.max(0.12, z * 0.87))} style={{ width: 32, height: 32, background: "rgba(0,0,0,0.7)", border: "1px solid rgba(180,100,50,0.4)", color: "#e8d5c4", borderRadius: 4, cursor: "pointer", fontSize: 18 }}>−</button>
        <button onClick={() => { setZoom(0.38); setPan({ x: 0, y: 0 }); }} style={{ width: 32, height: 32, background: "rgba(0,0,0,0.7)", border: "1px solid rgba(180,100,50,0.4)", color: "#e8d5c4", borderRadius: 4, cursor: "pointer", fontSize: 11 }}>⌖</button>
      </div>

      {/* Legend */}
      <div style={{ position: "absolute", bottom: 12, left: 12, zIndex: 10, background: "rgba(0,0,0,0.75)", border: "1px solid rgba(180,100,50,0.25)", borderRadius: 6, padding: "10px 14px" }}>
        <div style={{ fontSize: 10, letterSpacing: 3, color: "#9ca3af", textTransform: "uppercase", marginBottom: 8 }}>Regions</div>
        {categories.map(cat => (
          <div key={cat.id} style={{ display: "flex", alignItems: "center", gap: 7, marginBottom: 4, fontSize: 11, color: "#e8d5c4" }}>
            <div style={{ width: 10, height: 10, borderRadius: 2, background: cat.color, opacity: 0.7 }} />
            {cat.name}
          </div>
        ))}
        <div style={{ borderTop: "1px solid rgba(255,255,255,0.1)", marginTop: 8, paddingTop: 8, fontSize: 10, color: "#6b7280" }}>
          Drag nodes · Scroll to zoom · Drag canvas to pan
        </div>
      </div>

      <svg
        ref={svgRef}
        width="100%" height="100%"
        style={{ cursor: panning ? "grabbing" : dragging ? "grabbing" : "grab", touchAction: "none" }}
        onMouseDown={onSVGMouseDown}
        onMouseMove={onMouseMove}
        onMouseUp={onMouseUp}
        onMouseLeave={onMouseUp}
        onTouchStart={e => { const t = e.touches[0]; if (t && !dragging) { setPanning(true); panStart.current = { mx: t.clientX, my: t.clientY, px: pan.x, py: pan.y }; } }}
        onTouchMove={e => { const t = e.touches[0]; if (!t) return; if (dragging) { const svg = toSVG(t.clientX, t.clientY); setPositions(p => ({ ...p, [dragging.id]: { x: svg.x - dragging.ox, y: svg.y - dragging.oy } })); } else if (panning && panStart.current) { setPan({ x: panStart.current.px + t.clientX - panStart.current.mx, y: panStart.current.py + t.clientY - panStart.current.my }); } }}
        onTouchEnd={onMouseUp}
      >
        <defs>
          <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stopColor="#1a0505" />
            <stop offset="100%" stopColor="#070405" />
          </radialGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
          </filter>
          <filter id="glowStrong">
            <feGaussianBlur stdDeviation="6" result="blur" />
            <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
          </filter>
          <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
            <path d="M0,0 L0,6 L6,3 z" fill="rgba(180,100,50,0.5)" />
          </marker>
        </defs>

        <rect width="100%" height="100%" fill="url(#bgGrad)" />

        <g transform={`translate(${pan.x},${pan.y}) scale(${zoom})`}>

          {/* Location cluster halos */}
          {Object.entries(locClusters).map(([locId, pts]) => {
            if (pts.length === 0) return null;
            const cx = pts.reduce((s, p) => s + p.x, 0) / pts.length;
            const cy = pts.reduce((s, p) => s + p.y, 0) / pts.length;
            const loc = locById(locId);
            const cat = loc ? catById(loc.category) : null;
            const r = Math.max(80, pts.reduce((mx, p) => Math.max(mx, Math.hypot(p.x - cx, p.y - cy)), 0) + 70);
            return (
              <g key={locId}>
                <circle cx={cx} cy={cy} r={r} fill={`${cat?.color || "#555"}08`} stroke={`${cat?.color || "#555"}20`} strokeWidth={1} />
                <text x={cx} y={cy - r + 18} textAnchor="middle" fill={`${cat?.color || "#9ca3af"}99`} fontSize={13} fontFamily="Palatino Linotype, Palatino, serif" letterSpacing={2} style={{ textTransform: "uppercase" }}>
                  {loc?.name || locId}
                </text>
              </g>
            );
          })}

          {/* Relationship edges */}
          {relationships.map((rel, i) => {
            const fromPos = positions[rel.from];
            const toPos   = positions[rel.to];
            if (!fromPos || !toPos) return null;
            if (!visibleIds.has(rel.from) && !visibleIds.has(rel.to)) return null;
            const hov = hoveredEdge === i;
            const dx = toPos.x - fromPos.x, dy = toPos.y - fromPos.y;
            const dist = Math.hypot(dx, dy);
            if (dist < 1) return null;
            const mx = (fromPos.x + toPos.x) / 2;
            const my = (fromPos.y + toPos.y) / 2;
            // shorten line to node radius
            const ux = dx / dist, uy = dy / dist;
            const x1 = fromPos.x + ux * NODE_R, y1 = fromPos.y + uy * NODE_R;
            const x2 = toPos.x   - ux * NODE_R, y2 = toPos.y   - uy * NODE_R;

            return (
              <g key={i} onMouseEnter={() => setHoveredEdge(i)} onMouseLeave={() => setHoveredEdge(null)}>
                {/* invisible wide hit area */}
                <line x1={x1} y1={y1} x2={x2} y2={y2} stroke="transparent" strokeWidth={14} style={{ cursor: "default" }} />
                <line x1={x1} y1={y1} x2={x2} y2={y2}
                  stroke={hov ? "rgba(180,100,50,0.9)" : "rgba(180,100,50,0.22)"}
                  strokeWidth={hov ? 1.8 : 1}
                  strokeDasharray={hov ? "none" : "4 4"}
                  markerEnd="url(#arrow)"
                />
                {hov && (
                  <text x={mx} y={my - 8} textAnchor="middle" fill="#e8d5c4" fontSize={11} fontFamily="Palatino Linotype, Palatino, serif"
                    style={{ pointerEvents: "none", userSelect: "none" }}>
                    {rel.label}
                  </text>
                )}
              </g>
            );
          })}

          {/* NPC Nodes */}
          {npcs.map(npc => {
            const pos = positions[npc.id];
            if (!pos) return null;
            const visible = visibleIds.has(npc.id);
            const isStrahd = npc.id === darklordId;
            const r = isStrahd ? 56 : NODE_R;
            const st = getStatus(npc);
            const fc = factionColors[npc.faction] || "#9ca3af";
            const loc = locById(npc.location);
            const cat = loc ? catById(loc.category) : null;
            const hasNote = !!notes[npc.id];

            return (
              <g key={npc.id}
                transform={`translate(${pos.x},${pos.y})`}
                style={{ opacity: visible ? 1 : 0.15, cursor: "pointer" }}
                onMouseDown={e => onMouseDown(e, npc.id)}
                onTouchStart={e => { e.stopPropagation(); const t = e.touches[0]; if (t) { const svg = toSVG(t.clientX, t.clientY); setDragging({ id: npc.id, ox: svg.x - positions[npc.id].x, oy: svg.y - positions[npc.id].y, moved: false }); } }}
                onClick={e => { if (!dragging) { e.stopPropagation(); onSelectNPC(npc); } }}
                onMouseEnter={e => setTooltip({ npc, x: e.clientX, y: e.clientY })}
                onMouseLeave={() => setTooltip(null)}
              >
                {/* region color ring */}
                <circle r={r + 5} fill="none" stroke={cat?.color || "#555"} strokeWidth={2} opacity={0.35} />
                {/* glow for alive */}
                {st === "alive" && !isStrahd && (
                  <circle r={r} fill={`${fc}18`} filter="url(#glow)" />
                )}
                {/* main circle */}
                <circle r={r}
                  fill={isStrahd ? "#1a0010" : st === "dead" ? "#1a1a1a" : "#12080e"}
                  stroke={isStrahd ? "#c084fc" : fc}
                  strokeWidth={isStrahd ? 3 : 2}
                  filter={isStrahd ? "url(#glowStrong)" : undefined}
                />
                {/* status dot */}
                <circle cx={r * 0.65} cy={-r * 0.65} r={5} fill={statusColor(st)} />
                {/* note dot */}
                {hasNote && <circle cx={-r * 0.65} cy={-r * 0.65} r={4} fill="#b45309" />}
                {/* name */}
                <text textAnchor="middle" fill={isStrahd ? "#e8c0ff" : st === "dead" ? "#6b7280" : "#e8d5c4"}
                  fontSize={isStrahd ? 11 : 9.5}
                  fontFamily="Palatino Linotype, Palatino, serif"
                  fontWeight={isStrahd ? "600" : "400"}
                  style={{ userSelect: "none", pointerEvents: "none" }}>
                  {npc.name.split(" ").map((word, wi) => (
                    <tspan key={wi} x={0} dy={wi === 0 ? (npc.name.split(" ").length > 1 ? -(npc.name.split(" ").length - 1) * 6 : 4) : 13}>{word}</tspan>
                  ))}
                </text>
              </g>
            );
          })}
        </g>
      </svg>

      {/* Tooltip */}
      {tooltip && (
        <div style={{
          position: "fixed", left: tooltip.x + 14, top: tooltip.y - 10, zIndex: 50, pointerEvents: "none",
          background: "rgba(10,4,6,0.95)", border: `1px solid ${factionColors[tooltip.npc.faction]}55`,
          borderRadius: 6, padding: "8px 12px", maxWidth: 220,
        }}>
          <div style={{ fontSize: 13, color: "#e8d5c4", fontWeight: 600, marginBottom: 3 }}>{tooltip.npc.name}</div>
          <div style={{ fontSize: 11, color: factionColors[tooltip.npc.faction] }}>{tooltip.npc.faction} · {customStatus[tooltip.npc.id] || tooltip.npc.status}</div>
          <div style={{ fontSize: 11, color: "#9ca3af", marginTop: 3 }}>{locById(tooltip.npc.location)?.name}</div>
        </div>
      )}
    </div>
  );
}

// ── META MAP ────────────────────────────────────────────────
function MetaMap({ domains, categories, locations, npcs, customStatus, onSelectDomain, onEditDomain }) {
  const W = 900, H = 640, CX = W / 2, CY = H / 2;
  const getStatus = n => customStatus[n.id] || n.status;

  const domainStats = domains.map(dom => {
    const cats = categories.filter(cat => (cat.domain || "barovia") === dom.id);
    const locs = locations.filter(l => cats.some(cat => cat.id === l.category));
    const domNpcs = npcs.filter(n => locs.some(l => l.id === n.location));
    const darklord = npcs.find(n => n.id === dom.darklordId);
    return { dom, cats, locs, npcs: domNpcs, darklord,
      alive: domNpcs.filter(n => getStatus(n) === "alive").length,
      dead: domNpcs.filter(n => getStatus(n) === "dead").length };
  });

  const R = 210;
  const positioned = domainStats.map((d, i) => {
    const angle = (i / domainStats.length) * Math.PI * 2 - Math.PI / 2;
    return { ...d, x: CX + Math.cos(angle) * R, y: CY + Math.sin(angle) * R };
  });

  return (
    <div style={{ maxWidth: 940, margin: "0 auto" }}>
      <div style={{ textAlign: "center", marginBottom: 8 }}>
        <div style={{ fontSize: 11, letterSpacing: 5, color: "#9ca3af", textTransform: "uppercase" }}>Domains of Dread</div>
        <div style={{ fontSize: 12, color: "#6b7280", marginTop: 4 }}>Click a domain to open its node map · ✎ to edit</div>
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto" }}>
        <defs>
          <radialGradient id="mists" cx="50%" cy="50%" r="60%">
            <stop offset="0%" stopColor="#2a1a2e" stopOpacity="0.9" />
            <stop offset="60%" stopColor="#120a14" stopOpacity="0.6" />
            <stop offset="100%" stopColor="#070405" stopOpacity="0" />
          </radialGradient>
          <filter id="mistBlur"><feGaussianBlur stdDeviation="14" /></filter>
        </defs>

        {/* Mists background */}
        <ellipse cx={CX} cy={CY} rx={W * 0.48} ry={H * 0.46} fill="url(#mists)" />
        <ellipse cx={CX} cy={CY} rx={W * 0.34} ry={H * 0.30} fill="#3b2440" opacity="0.25" filter="url(#mistBlur)" />

        {/* Central Mists node */}
        <g>
          <circle cx={CX} cy={CY} r={58} fill="#160b18" stroke="#6b7280" strokeWidth="1.5" strokeDasharray="5 4" opacity="0.9" />
          <text x={CX} y={CY - 4} textAnchor="middle" fill="#9ca3af" fontSize="14" fontFamily="Palatino Linotype, Palatino, serif" letterSpacing="3">THE</text>
          <text x={CX} y={CY + 14} textAnchor="middle" fill="#c4a882" fontSize="15" fontFamily="Palatino Linotype, Palatino, serif" letterSpacing="4">MISTS</text>
        </g>

        {/* Connections + domain nodes */}
        {positioned.map(d => (
          <g key={d.dom.id}>
            <line x1={CX} y1={CY} x2={d.x} y2={d.y} stroke="#6b7280" strokeWidth="1" strokeDasharray="3 5" opacity="0.4" />
          </g>
        ))}
        {positioned.map(d => (
          <g key={"n" + d.dom.id} style={{ cursor: "pointer" }} onClick={() => onSelectDomain(d.dom.id)}>
            <circle cx={d.x} cy={d.y} r={86} fill={`${d.dom.color}14`} stroke={d.dom.color} strokeWidth="2" />
            <circle cx={d.x} cy={d.y} r={92} fill="none" stroke={d.dom.color} strokeWidth="1" opacity="0.3" strokeDasharray="2 4" />
            <text x={d.x} y={d.y - 34} textAnchor="middle" fill={d.dom.color} fontSize="17" fontWeight="600" fontFamily="Palatino Linotype, Palatino, serif" letterSpacing="2">{d.dom.name}</text>
            {d.darklord && (
              <text x={d.x} y={d.y - 14} textAnchor="middle" fill="#e8d5c4" fontSize="11" fontFamily="Palatino Linotype, Palatino, serif" fontStyle="italic">
                ★ {d.darklord.name}
              </text>
            )}
            <text x={d.x} y={d.y + 8} textAnchor="middle" fill="#9ca3af" fontSize="11" fontFamily="Palatino Linotype, Palatino, serif">{d.cats.length} regions · {d.locs.length} locations</text>
            <text x={d.x} y={d.y + 26} textAnchor="middle" fill="#9ca3af" fontSize="11" fontFamily="Palatino Linotype, Palatino, serif">
              <tspan fill="#4ade80">{d.alive} alive</tspan>
              <tspan fill="#6b7280"> · </tspan>
              <tspan fill="#f87171">{d.dead} dead</tspan>
            </text>
            <text x={d.x} y={d.y + 48} textAnchor="middle" fill="#6b7280" fontSize="10" fontFamily="Palatino Linotype, Palatino, serif">{d.npcs.length} NPCs</text>
            <g onClick={e => { e.stopPropagation(); onEditDomain(d.dom); }}>
              <circle cx={d.x + 66} cy={d.y - 60} r={13} fill="rgba(255,255,255,0.06)" stroke="#6b7280" strokeWidth="0.8" />
              <text x={d.x + 66} y={d.y - 55} textAnchor="middle" fill="#9ca3af" fontSize="12">✎</text>
            </g>
          </g>
        ))}
      </svg>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App() {
  // Auto-load from browser storage if available
  const loadSaved = (key, fallback) => {
    try {
      const raw = window.localStorage.getItem("npcCodex_" + key);
      return raw ? JSON.parse(raw) : fallback;
    } catch { return fallback; }
  };
  const [npcs, setNpcs]               = useState(() => loadSaved("npcs", INITIAL_NPCS));
  const [locations, setLocations]     = useState(() => loadSaved("locations", INITIAL_LOCATIONS));
  const [categories, setCategories]   = useState(() => loadSaved("categories", INITIAL_CATEGORIES).map(cat => ({ domain: "barovia", ...cat })));
  const [domains, setDomains]         = useState(() => loadSaved("domains", INITIAL_DOMAINS));
  const [relationships, setRelationships] = useState(() => loadSaved("relationships", INITIAL_RELATIONSHIPS));
  const [customStatus, setCustomStatus] = useState(() => loadSaved("customStatus", {}));
  const [notes, setNotes]             = useState(() => loadSaved("notes", {}));
  const [darklordId, setDarklordId]   = useState(() => loadSaved("darklordId", "strahd"));

  // Auto-save on every change
  useEffect(() => { try { window.localStorage.setItem("npcCodex_npcs", JSON.stringify(npcs)); } catch {} }, [npcs]);
  useEffect(() => { try { window.localStorage.setItem("npcCodex_locations", JSON.stringify(locations)); } catch {} }, [locations]);
  useEffect(() => { try { window.localStorage.setItem("npcCodex_categories", JSON.stringify(categories)); } catch {} }, [categories]);
  useEffect(() => { try { window.localStorage.setItem("npcCodex_relationships", JSON.stringify(relationships)); } catch {} }, [relationships]);
  useEffect(() => { try { window.localStorage.setItem("npcCodex_customStatus", JSON.stringify(customStatus)); } catch {} }, [customStatus]);
  useEffect(() => { try { window.localStorage.setItem("npcCodex_notes", JSON.stringify(notes)); } catch {} }, [notes]);
  useEffect(() => { try { window.localStorage.setItem("npcCodex_darklordId", JSON.stringify(darklordId)); } catch {} }, [darklordId]);
  useEffect(() => { try { window.localStorage.setItem("npcCodex_domains", JSON.stringify(domains)); } catch {} }, [domains]);
  const [filter, setFilter]           = useState({ faction: "all", location: "all", category: "all", domain: "all", search: "" });
  const [view, setView]               = useState("grid"); // grid | map | detail
  const [selected, setSelected]       = useState(null);
  const [editingNote, setEditingNote] = useState(false);
  const [noteText, setNoteText]       = useState("");
  const [modal, setModal]             = useState(null);
  const [collapsed, setCollapsed]     = useState({});
  const [exportText, setExportText]   = useState("");

  const getStatus = npc => customStatus[npc.id] || npc.status;
  const locById   = id => locations.find(l => l.id === id);
  const catById   = id => categories.find(c => c.id === id);

  const cycleStatus = (npc, e) => {
    e?.stopPropagation();
    const s = ["alive", "dead", "unknown"];
    setCustomStatus(p => ({ ...p, [npc.id]: s[(s.indexOf(getStatus(npc)) + 1) % s.length] }));
  };

  const getRels = id => relationships
    .filter(r => r.from === id || r.to === id)
    .map(r => ({ ...r, other: npcs.find(n => n.id === (r.from === id ? r.to : r.from)), direction: r.from === id ? "→" : "←" }));

  const domById = id => domains.find(d => d.id === id);
  const filtered = npcs.filter(n => {
    const loc = locById(n.location);
    const cat = loc ? catById(loc.category) : null;
    if (filter.faction !== "all" && n.faction !== filter.faction) return false;
    if (filter.location !== "all" && n.location !== filter.location) return false;
    if (filter.category !== "all" && loc?.category !== filter.category) return false;
    if (filter.domain !== "all" && (cat?.domain || "barovia") !== filter.domain) return false;
    if (filter.search && !n.name.toLowerCase().includes(filter.search.toLowerCase())) return false;
    return true;
  });

  const groupedByDomain = domains.map(dom => {
    const cats = categories.filter(cat => (cat.domain || "barovia") === dom.id).map(cat => {
      const locs = locations.filter(l => l.category === cat.id)
        .map(loc => ({ loc, npcs: filtered.filter(n => n.location === loc.id) }))
        .filter(x => x.npcs.length);
      return locs.length ? { cat, locs } : null;
    }).filter(Boolean);
    return cats.length ? { dom, cats } : null;
  }).filter(Boolean);

  // forms
  const [npcF, setNpcF] = useState({ name: "", location: "", faction: "neutral", status: "alive", description: "", tags: "" });
  const [locF, setLocF] = useState({ name: "", category: "", color: "#6b7280" });
  const [catF, setCatF] = useState({ name: "", color: "#6b7280", domain: "barovia" });
  const [domF, setDomF] = useState({ name: "", color: "#6b7280", darklordId: "" });
  const [editingDomId, setEditingDomId] = useState(null);
  const [relF, setRelF] = useState({ from: "", to: "", label: "" });

  const addNPC = () => {
    if (!npcF.name.trim()) return;
    const id = npcF.name.toLowerCase().replace(/\W+/g, "_") + "_" + Date.now();
    setNpcs(p => [...p, { ...npcF, id, tags: npcF.tags.split(",").map(t => t.trim()).filter(Boolean) }]);
    setModal(null);
  };
  const addLoc = () => {
    if (!locF.name.trim()) return;
    const id = locF.name.toLowerCase().replace(/\W+/g, "_") + "_" + Date.now();
    setLocations(p => [...p, { ...locF, id }]);
    setModal(null);
  };
  const addCat = () => {
    if (!catF.name.trim()) return;
    const id = catF.name.toLowerCase().replace(/\W+/g, "_") + "_" + Date.now();
    setCategories(p => [...p, { ...catF, id }]);
    setModal(null);
  };
  const addDom = () => {
    if (!domF.name.trim()) return;
    const id = domF.name.toLowerCase().replace(/\W+/g, "_") + "_" + Date.now();
    setDomains(p => [...p, { ...domF, id }]);
    setModal(null);
  };
  const openEditDom = dom => {
    setEditingDomId(dom.id);
    setDomF({ name: dom.name, color: dom.color || "#6b7280", darklordId: dom.darklordId || "" });
    setModal("dom");
  };
  const saveDom = () => {
    if (!domF.name.trim()) return;
    setDomains(p => p.map(d => d.id === editingDomId ? { ...d, ...domF } : d));
    setEditingDomId(null);
    setModal(null);
  };

  // Cascade deletes
  const removeNPCs = ids => {
    if (!ids.length) return;
    const idSet = new Set(ids);
    setNpcs(p => p.filter(n => !idSet.has(n.id)));
    setRelationships(p => p.filter(r => !idSet.has(r.from) && !idSet.has(r.to)));
    setNotes(p => { const q = { ...p }; ids.forEach(id => delete q[id]); return q; });
    setCustomStatus(p => { const q = { ...p }; ids.forEach(id => delete q[id]); return q; });
  };
  const deleteLoc = id => {
    const affected = npcs.filter(n => n.location === id);
    const loc = locations.find(l => l.id === id);
    if (!window.confirm(`Delete location "${loc?.name}"?\nThis also deletes ${affected.length} NPC(s) in it. This cannot be undone.`)) return;
    removeNPCs(affected.map(n => n.id));
    setLocations(p => p.filter(l => l.id !== id));
    setEditingLocId(null); setModal(null);
  };
  const deleteCat = id => {
    const catLocs = locations.filter(l => l.category === id);
    const locIds = new Set(catLocs.map(l => l.id));
    const affected = npcs.filter(n => locIds.has(n.location));
    const cat = categories.find(x => x.id === id);
    if (!window.confirm(`Delete region "${cat?.name}"?\nThis also deletes ${catLocs.length} location(s) and ${affected.length} NPC(s). This cannot be undone.`)) return;
    removeNPCs(affected.map(n => n.id));
    setLocations(p => p.filter(l => l.category !== id));
    setCategories(p => p.filter(x => x.id !== id));
    setEditingCatId(null); setModal(null);
  };
  const deleteDom = id => {
    const domCats = categories.filter(cat => (cat.domain || "barovia") === id);
    const catIds = new Set(domCats.map(x => x.id));
    const domLocs = locations.filter(l => catIds.has(l.category));
    const locIds = new Set(domLocs.map(l => l.id));
    const affected = npcs.filter(n => locIds.has(n.location));
    const dom = domains.find(d => d.id === id);
    if (!window.confirm(`Delete domain "${dom?.name}"?\nThis also deletes ${domCats.length} region(s), ${domLocs.length} location(s) and ${affected.length} NPC(s). This cannot be undone.`)) return;
    removeNPCs(affected.map(n => n.id));
    setLocations(p => p.filter(l => !catIds.has(l.category)));
    setCategories(p => p.filter(x => !catIds.has(x.id)));
    setDomains(p => p.filter(d => d.id !== id));
    setEditingDomId(null); setModal(null);
  };
  const addRel = () => {
    if (!relF.from || !relF.to || !relF.label) return;
    setRelationships(p => [...p, { ...relF }]);
    setModal(null);
  };

  const [editingLocId, setEditingLocId] = useState(null);
  const openEditLoc = loc => {
    setEditingLocId(loc.id);
    setLocF({ name: loc.name, category: loc.category, color: loc.color || "#6b7280" });
    setModal("loc");
  };
  const saveLoc = () => {
    if (!locF.name.trim()) return;
    setLocations(p => p.map(l => l.id === editingLocId ? { ...l, ...locF } : l));
    setEditingLocId(null);
    setModal(null);
  };

  const [editingCatId, setEditingCatId] = useState(null);
  const openEditCat = cat => {
    setEditingCatId(cat.id);
    setCatF({ name: cat.name, color: cat.color || "#6b7280", domain: cat.domain || "barovia" });
    setModal("cat");
  };
  const saveCat = () => {
    if (!catF.name.trim()) return;
    setCategories(p => p.map(c => c.id === editingCatId ? { ...c, ...catF } : c));
    setEditingCatId(null);
    setModal(null);
  };
  const deleteNPC = id => {
    setNpcs(p => p.filter(n => n.id !== id));
    setRelationships(p => p.filter(r => r.from !== id && r.to !== id));
    setNotes(p => { const q = { ...p }; delete q[id]; return q; });
    setCustomStatus(p => { const q = { ...p }; delete q[id]; return q; });
    setView("grid"); setSelected(null);
  };

  const [editingNPCId, setEditingNPCId] = useState(null);
  const openEditNPC = npc => {
    setEditingNPCId(npc.id);
    setNpcF({ name: npc.name, location: npc.location, faction: npc.faction, status: npc.status, description: npc.description, tags: npc.tags.join(", ") });
    setModal("npc");
  };
  const saveNPC = () => {
    if (!npcF.name.trim()) return;
    setNpcs(p => p.map(n => n.id === editingNPCId
      ? { ...n, ...npcF, tags: npcF.tags.split(",").map(t => t.trim()).filter(Boolean) }
      : n
    ));
    // sync selected so detail view refreshes
    setSelected(prev => prev?.id === editingNPCId ? { ...prev, ...npcF, tags: npcF.tags.split(",").map(t => t.trim()).filter(Boolean) } : prev);
    setEditingNPCId(null);
    setModal(null);
  };

  const openDetail = npc => { setSelected(npc); setNoteText(notes[npc.id] || ""); setEditingNote(false); setView("detail"); };
  const saveNote   = () => { if (selected) setNotes(p => ({ ...p, [selected.id]: noteText })); setEditingNote(false); };

  const exportData = () => {
    const data = { npcs, locations, categories, relationships, customStatus, notes, darklordId, domains, exportedAt: new Date().toISOString() };
    setExportText(JSON.stringify(data, null, 2));
    setModal("export");
  };

  const importData = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.npcs)         setNpcs(data.npcs);
        if (data.locations)    setLocations(data.locations);
        if (data.categories)   setCategories(data.categories);
        if (data.relationships) setRelationships(data.relationships);
        if (data.customStatus) setCustomStatus(data.customStatus);
        if (data.notes)        setNotes(data.notes);
        setView("grid");
      } catch {
        alert("Could not read file — make sure it's a valid NPC Codex JSON export.");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  const importRef = useRef(null);

  const locOpts = locations.map(l => ({ value: l.id, label: l.name }));
  const catOpts = categories.map(c => ({ value: c.id, label: c.name }));
  const npcOpts = npcs.map(n => ({ value: n.id, label: n.name }));

  const Card = ({ npc }) => {
    const st = getStatus(npc);
    return (
      <div onClick={() => openDetail(npc)}
        style={{ background: "rgba(255,255,255,0.03)", border: `1px solid ${factionColors[npc.faction] || "#555"}33`, borderLeft: `3px solid ${factionColors[npc.faction] || "#555"}`, borderRadius: 6, padding: "11px 13px", cursor: "pointer", position: "relative", opacity: st === "dead" ? 0.55 : 1, transition: "all 0.12s" }}
        onMouseEnter={e => { e.currentTarget.style.background = "rgba(255,255,255,0.07)"; e.currentTarget.style.transform = "translateY(-1px)"; }}
        onMouseLeave={e => { e.currentTarget.style.background = "rgba(255,255,255,0.03)"; e.currentTarget.style.transform = "none"; }}
      >
        <div onClick={e => cycleStatus(npc, e)} title={`${st} — click to cycle`}
          style={{ position: "absolute", top: 9, right: 9, width: 8, height: 8, borderRadius: "50%", background: statusColor(st), boxShadow: `0 0 6px ${statusColor(st)}`, cursor: "pointer" }} />
        <div style={{ fontSize: 13, fontWeight: 600, color: "#e8d5c4", paddingRight: 16, marginBottom: 3, textDecoration: st === "dead" ? "line-through" : "none" }}>{npc.name}</div>
        <div style={{ fontSize: 11, color: "#9ca3af" }}>{npc.faction}{npc.tags[0] ? ` · ${npc.tags[0]}` : ""}</div>
        {notes[npc.id] && <div style={{ fontSize: 10, color: "#b45309", marginTop: 4 }}>📝 notes</div>}
      </div>
    );
  };

  const Detail = () => {
    if (!selected) return null;
    const npc = npcs.find(n => n.id === selected.id) || selected;
    const st  = getStatus(npc);
    const rels = getRels(npc.id);
    const loc  = locById(npc.location);
    const cat  = loc ? catById(loc.category) : null;
    return (
      <div style={{ maxWidth: 760, margin: "0 auto" }}>
        <div style={{ background: "rgba(255,255,255,0.04)", border: `1px solid ${factionColors[npc.faction]}44`, borderLeft: `4px solid ${factionColors[npc.faction]}`, borderRadius: 8, padding: "24px 28px", marginBottom: 16 }}>
          <div style={{ display: "flex", justifyContent: "space-between", flexWrap: "wrap", gap: 12 }}>
            <div>
              <div style={{ fontSize: 10, letterSpacing: 4, color: "#9ca3af", textTransform: "uppercase", marginBottom: 5 }}>{cat?.name}{loc ? ` › ${loc.name}` : ""}</div>
              <h2 style={{ margin: "0 0 10px", fontSize: 22, fontWeight: 400, color: "#e8d5c4", textDecoration: st === "dead" ? "line-through" : "none" }}>{npc.name}</h2>
              <div style={{ display: "flex", gap: 7, flexWrap: "wrap" }}>
                <span style={{ background: `${factionColors[npc.faction]}22`, border: `1px solid ${factionColors[npc.faction]}55`, color: factionColors[npc.faction], padding: "3px 10px", borderRadius: 12, fontSize: 12 }}>{npc.faction}</span>
                {npc.tags.map(t => <span key={t} style={{ background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)", color: "#9ca3af", padding: "3px 10px", borderRadius: 12, fontSize: 12 }}>{t}</span>)}
              </div>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 8, alignItems: "flex-end" }}>
              <button onClick={e => cycleStatus(npc, e)} style={{ background: `${statusColor(st)}22`, border: `1px solid ${statusColor(st)}55`, color: statusColor(st), padding: "6px 14px", borderRadius: 6, fontSize: 13, cursor: "pointer" }}>● {st.toUpperCase()}</button>
              <button onClick={() => openEditNPC(npc)} style={{ background: "rgba(180,100,50,0.12)", border: "1px solid rgba(180,100,50,0.4)", color: "#e8b87a", padding: "5px 12px", borderRadius: 6, fontSize: 12, cursor: "pointer" }}>✎ Edit NPC</button>
              {npc.id !== darklordId
                ? <button onClick={() => setDarklordId(npc.id)} style={{ background: "rgba(192,132,252,0.12)", border: "1px solid rgba(192,132,252,0.4)", color: "#c084fc", padding: "5px 12px", borderRadius: 6, fontSize: 12, cursor: "pointer" }}>★ Als Darklord setzen</button>
                : <span style={{ fontSize: 11, color: "#c084fc", padding: "5px 12px" }}>★ Aktueller Darklord</span>
              }
              <button onClick={() => { if (window.confirm(`Delete "${npc.name}"? This cannot be undone.`)) deleteNPC(npc.id); }} style={{ background: "rgba(239,68,68,0.1)", border: "1px solid rgba(239,68,68,0.35)", color: "#f87171", padding: "5px 12px", borderRadius: 6, fontSize: 12, cursor: "pointer" }}>🗑 Delete NPC</button>
            </div>
          </div>
          <p style={{ margin: "16px 0 0", fontSize: 15, lineHeight: 1.7, color: "#c4a882", fontStyle: "italic" }}>{npc.description}</p>
        </div>

        <div style={{ background: "rgba(255,255,255,0.02)", border: "1px solid rgba(180,100,50,0.2)", borderRadius: 8, padding: "16px 20px", marginBottom: 14 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <h3 style={{ margin: 0, fontSize: 11, letterSpacing: 3, textTransform: "uppercase", color: "#9ca3af", fontWeight: 400 }}>Relationships</h3>
            <Btn small onClick={() => { setRelF({ from: npc.id, to: "", label: "" }); setModal("rel"); }}>+ Add</Btn>
          </div>
          {rels.length === 0 && <div style={{ fontSize: 13, color: "#6b7280", fontStyle: "italic" }}>No relationships yet.</div>}
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {rels.map((r, i) => {
              const os = r.other ? getStatus(r.other) : "unknown";
              return (
                <div key={i} onClick={() => r.other && openDetail(r.other)}
                  style={{ display: "flex", alignItems: "center", gap: 10, padding: "7px 10px", borderRadius: 5, cursor: "pointer", background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.05)" }}
                  onMouseEnter={e => e.currentTarget.style.background = "rgba(255,255,255,0.06)"}
                  onMouseLeave={e => e.currentTarget.style.background = "rgba(255,255,255,0.02)"}>
                  <div style={{ width: 7, height: 7, borderRadius: "50%", background: factionColors[r.other?.faction] || "#555", flexShrink: 0 }} />
                  <div style={{ fontSize: 12, color: "#b45309", width: 130, flexShrink: 0 }}>{r.direction} {r.label}</div>
                  <div style={{ fontSize: 13, color: "#e8d5c4", textDecoration: os === "dead" ? "line-through" : "none", opacity: os === "dead" ? 0.6 : 1 }}>{r.other?.name || r.to}</div>
                  <div style={{ fontSize: 11, color: "#6b7280", marginLeft: "auto" }}>{locById(r.other?.location)?.name}</div>
                </div>
              );
            })}
          </div>
        </div>

        <div style={{ background: "rgba(255,255,255,0.02)", border: "1px solid rgba(124,58,237,0.3)", borderRadius: 8, padding: "16px 20px" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <h3 style={{ margin: 0, fontSize: 11, letterSpacing: 3, textTransform: "uppercase", color: "#9ca3af", fontWeight: 400 }}>DM Notes</h3>
            {!editingNote
              ? <Btn small color="#7c3aed" onClick={() => setEditingNote(true)}>{notes[npc.id] ? "Edit" : "+ Add Note"}</Btn>
              : <div style={{ display: "flex", gap: 8 }}><Btn small color="#4ade80" onClick={saveNote}>Save</Btn><Btn small color="#6b7280" onClick={() => setEditingNote(false)}>Cancel</Btn></div>
            }
          </div>
          {editingNote
            ? <textarea value={noteText} onChange={e => setNoteText(e.target.value)} placeholder="Session notes, plot hooks, interactions…" style={{ ...inputStyle, width: "100%", minHeight: 90, resize: "vertical", boxSizing: "border-box" }} />
            : <div style={{ fontSize: 14, color: notes[npc.id] ? "#c4a882" : "#6b7280", fontStyle: "italic", lineHeight: 1.6 }}>{notes[npc.id] || "No notes yet."}</div>
          }
        </div>
      </div>
    );
  };

  return (
    <div style={{ height: "100vh", display: "flex", flexDirection: "column", background: "#0a0608", color: "#e8d5c4", fontFamily: "'Palatino Linotype', Palatino, serif", overflow: "hidden" }}>

      {/* ── HEADER ── */}
      <div style={{ flexShrink: 0, borderBottom: "1px solid rgba(180,100,50,0.25)", padding: "12px 24px", background: "rgba(10,6,8,0.98)", backdropFilter: "blur(6px)", zIndex: 50 }}>
        <div style={{ display: "flex", alignItems: "center", flexWrap: "wrap", gap: 12, marginBottom: 10 }}>
          <div>
            <div style={{ fontSize: 9, letterSpacing: 5, color: "#b45309", textTransform: "uppercase" }}>✦ Ravenloft Campaign ✦</div>
            <h1 style={{ margin: "2px 0 0", fontSize: 19, fontWeight: 400, letterSpacing: 2, background: "linear-gradient(135deg,#e8d5c4,#b45309,#e8d5c4)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>NPC Codex</h1>
          </div>
          <div style={{ flex: 1 }} />

          {/* View switcher */}
          <div style={{ display: "flex", gap: 2, background: "rgba(255,255,255,0.05)", border: "1px solid rgba(180,100,50,0.25)", borderRadius: 6, padding: 3 }}>
            {[["grid", "☰ Grid"], ["map", "⬡ Node Map"], ["meta", "◎ Meta"], ["detail", "◈ Detail"]].map(([v, label]) => (
              <button key={v} onClick={() => setView(v)}
                style={{ background: view === v ? "rgba(180,100,50,0.3)" : "transparent", border: "none", color: view === v ? "#e8d5c4" : "#9ca3af", padding: "5px 14px", borderRadius: 4, cursor: "pointer", fontSize: 12, transition: "all 0.12s" }}>
                {label}
              </button>
            ))}
          </div>

          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            <Btn color="#4ade80" onClick={() => { setEditingNPCId(null); setNpcF({ name: "", location: locations[0]?.id || "", faction: "neutral", status: "alive", description: "", tags: "" }); setModal("npc"); }}>+ NPC</Btn>
            <Btn color="#60a5fa" onClick={() => { setEditingLocId(null); setLocF({ name: "", category: categories[0]?.id || "", color: "#6b7280" }); setModal("loc"); }}>+ Location</Btn>
            <Btn color="#c084fc" onClick={() => { setEditingCatId(null); setCatF({ name: "", color: "#6b7280", domain: domains[0]?.id || "barovia" }); setModal("cat"); }}>+ Region</Btn>
            <Btn color="#f472b6" onClick={() => { setEditingDomId(null); setDomF({ name: "", color: "#6b7280", darklordId: "" }); setModal("dom"); }}>+ Domain</Btn>
          </div>
        </div>

        {view !== "map" && (
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
            <input placeholder="Search…" value={filter.search} onChange={e => setFilter(f => ({ ...f, search: e.target.value }))} style={{ ...inputStyle, width: 140 }} />
            {[
              ["faction", [{ value: "all", label: "All Factions" }, { value: "allied", label: "Allied" }, { value: "neutral", label: "Neutral" }, { value: "hostile", label: "Hostile" }]],
              ["domain", [{ value: "all", label: "All Domains" }, ...domains.map(d => ({ value: d.id, label: d.name }))]],
              ["category", [{ value: "all", label: "All Regions" }, ...catOpts]],
              ["location", [{ value: "all", label: "All Locations" }, ...locOpts]],
            ].map(([key, opts]) => (
              <select key={key} value={filter[key]} onChange={e => setFilter(f => ({ ...f, [key]: e.target.value }))}
                style={{ background: "#1a0a0a", border: "1px solid rgba(180,100,50,0.3)", borderRadius: 4, padding: "6px 9px", color: "#e8d5c4", fontSize: 13, outline: "none" }}>
                {opts.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
              </select>
            ))}
            <span style={{ fontSize: 12, color: "#6b7280" }}>{filtered.length}/{npcs.length}</span>
          </div>
        )}

        {view === "map" && (
          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
            {[
              ["faction", [{ value: "all", label: "All Factions" }, { value: "allied", label: "Allied" }, { value: "neutral", label: "Neutral" }, { value: "hostile", label: "Hostile" }]],
              ["domain", [{ value: "all", label: "All Domains" }, ...domains.map(d => ({ value: d.id, label: d.name }))]],
              ["category", [{ value: "all", label: "All Regions" }, ...catOpts]],
            ].map(([key, opts]) => (
              <select key={key} value={filter[key]} onChange={e => setFilter(f => ({ ...f, [key]: e.target.value }))}
                style={{ background: "#1a0a0a", border: "1px solid rgba(180,100,50,0.3)", borderRadius: 4, padding: "6px 9px", color: "#e8d5c4", fontSize: 13, outline: "none" }}>
                {opts.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
              </select>
            ))}
            <span style={{ fontSize: 11, color: "#6b7280" }}>Click node to open detail · Hover edge to see label</span>
          </div>
        )}
      </div>

      {/* ── BODY ── */}
      <div style={{ flex: 1, overflow: view === "map" ? "hidden" : "auto", position: "relative" }}>
        {view === "map" && (
          <NodeMap
            npcs={npcs} locations={locations} categories={categories}
            relationships={relationships} customStatus={customStatus} notes={notes}
            onSelectNPC={npc => openDetail(npc)}
            filterFaction={filter.faction} filterCategory={filter.category} filterDomain={filter.domain}
            darklordId={(filter.domain !== "all" && domById(filter.domain)?.darklordId) || darklordId}
          />
        )}

        {view === "grid" && (
          <div style={{ padding: "20px 24px 72px" }}>
            {groupedByDomain.length === 0 && <div style={{ color: "#6b7280", fontStyle: "italic", textAlign: "center", marginTop: 60 }}>No NPCs match your filters.</div>}
            {groupedByDomain.map(({ dom, cats }) => (
              <div key={dom.id} style={{ marginBottom: 36 }}>
                {/* Domain header */}
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16, padding: "8px 12px", background: `${dom.color}12`, border: `1px solid ${dom.color}44`, borderRadius: 8 }}>
                  <span style={{ fontSize: 16 }}>🌫️</span>
                  <span style={{ fontSize: 15, letterSpacing: 5, textTransform: "uppercase", color: dom.color, fontWeight: 600 }}>{dom.name}</span>
                  {dom.darklordId && npcs.find(n => n.id === dom.darklordId) && (
                    <span style={{ fontSize: 11, color: "#9ca3af" }}>Darklord: {npcs.find(n => n.id === dom.darklordId)?.name}</span>
                  )}
                  <div style={{ flex: 1 }} />
                  <span onClick={() => openEditDom(dom)} title="Edit domain" style={{ fontSize: 12, color: "#6b7280", cursor: "pointer", padding: "2px 6px", borderRadius: 3, background: "rgba(255,255,255,0.06)" }}>✎</span>
                </div>
                <div style={{ paddingLeft: 8 }}>
                {cats.map(({ cat, locs }) => (
              <div key={cat.id} style={{ marginBottom: 28 }}>
                <div onClick={() => setCollapsed(p => ({ ...p, [cat.id]: !p[cat.id] }))}
                  style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12, cursor: "pointer", userSelect: "none" }}>
                  <div style={{ width: 12, height: 12, borderRadius: "50%", background: cat.color, boxShadow: `0 0 10px ${cat.color}88` }} />
                  <span style={{ fontSize: 13, letterSpacing: 4, textTransform: "uppercase", color: cat.color, fontWeight: 400 }}>{cat.name}</span>
                  <span style={{ fontSize: 11, color: "#6b7280" }}>({locs.reduce((a, l) => a + l.npcs.length, 0)})</span>
                  <div style={{ flex: 1, height: 1, background: `${cat.color}33` }} />
                  <span onClick={e => { e.stopPropagation(); openEditCat(cat); }} title="Rename region" style={{ fontSize: 12, color: "#6b7280", cursor: "pointer", padding: "2px 6px", borderRadius: 3, background: "rgba(255,255,255,0.04)" }}>✎</span>
                  <span style={{ fontSize: 12, color: "#6b7280" }}>{collapsed[cat.id] ? "▶" : "▼"}</span>
                </div>
                {!collapsed[cat.id] && (
                  <div style={{ paddingLeft: 22 }}>
                    {locs.map(({ loc, npcs: ln }) => (
                      <div key={loc.id} style={{ marginBottom: 16 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                          <div style={{ width: 6, height: 6, borderRadius: "50%", background: loc.color || cat.color }} />
                          <span style={{ fontSize: 11, letterSpacing: 3, textTransform: "uppercase", color: "#9ca3af" }}>{loc.name}</span>
                          <span onClick={() => openEditLoc(loc)} title="Edit location" style={{ fontSize: 11, color: "#6b7280", cursor: "pointer", padding: "1px 5px", borderRadius: 3, background: "rgba(255,255,255,0.04)" }}>✎</span>
                          <div style={{ flex: 1, height: 1, background: "rgba(180,100,50,0.1)" }} />
                        </div>
                        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(185px,1fr))", gap: 8 }}>
                          {ln.map(npc => <Card key={npc.id} npc={npc} />)}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
                ))}
                </div>
              </div>
            ))}
          </div>
        )}

        {view === "meta" && (
          <div style={{ padding: "20px 24px 72px" }}>
            <MetaMap
              domains={domains} categories={categories} locations={locations} npcs={npcs}
              customStatus={customStatus}
              onSelectDomain={domId => { setFilter(f => ({ ...f, domain: domId, category: "all", location: "all" })); setView("map"); }}
              onEditDomain={openEditDom}
            />
          </div>
        )}

        {view === "detail" && (
          <div style={{ padding: "20px 24px 72px" }}>
            <Detail />
          </div>
        )}
      </div>

      {/* ── STATUS BAR ── */}
      <div style={{ flexShrink: 0, background: "rgba(0,0,0,0.92)", borderTop: "1px solid rgba(180,100,50,0.15)", padding: "6px 24px", display: "flex", gap: 18, alignItems: "center", fontSize: 12, color: "#6b7280" }}>
        <span style={{ color: "#4ade80" }}>● {npcs.filter(n => (customStatus[n.id] || n.status) === "alive").length} alive</span>
        <span style={{ color: "#f87171" }}>● {npcs.filter(n => (customStatus[n.id] || n.status) === "dead").length} dead</span>
        <span style={{ color: "#facc15" }}>● {npcs.filter(n => (customStatus[n.id] || n.status) === "unknown").length} unknown</span>
        <span>{locations.length} locations · {categories.length} regions · {domains.length} domains</span>
        <span style={{ color: "#b45309" }}>📝 {Object.keys(notes).length} notes</span>
        <div style={{ marginLeft: "auto", display: "flex", gap: 8, alignItems: "center" }}>
          <input ref={importRef} type="file" accept=".json" onChange={importData} style={{ display: "none" }} />
          <button onClick={() => { setExportText(""); setModal("import_paste"); }}
            style={{ background: "rgba(96,165,250,0.12)", border: "1px solid rgba(96,165,250,0.35)", color: "#60a5fa", padding: "4px 12px", borderRadius: 4, fontSize: 11, cursor: "pointer" }}>
            ⬆ Import JSON
          </button>
          <button onClick={exportData}
            style={{ background: "rgba(180,100,50,0.15)", border: "1px solid rgba(180,100,50,0.4)", color: "#e8b87a", padding: "4px 12px", borderRadius: 4, fontSize: 11, cursor: "pointer" }}>
            ⬇ Export JSON
          </button>
        </div>
      </div>

      {/* ── MODALS ── */}
      {modal === "npc" && (
        <Modal title={editingNPCId ? "Edit NPC" : "Add NPC"} onClose={() => { setModal(null); setEditingNPCId(null); }}>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 12 }}>
            <Field label="Name *"><input value={npcF.name} onChange={e => setNpcF(f => ({ ...f, name: e.target.value }))} style={inputStyle} /></Field>
            <Field label="Location">
              <select value={npcF.location} onChange={e => setNpcF(f => ({ ...f, location: e.target.value }))} style={{ ...inputStyle, background: "#1a0a0a" }}>
                {locOpts.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
              </select>
            </Field>
            <Field label="Faction">
              <select value={npcF.faction} onChange={e => setNpcF(f => ({ ...f, faction: e.target.value }))} style={{ ...inputStyle, background: "#1a0a0a" }}>
                {["allied","neutral","hostile"].map(v => <option key={v} value={v}>{v}</option>)}
              </select>
            </Field>
            <Field label="Status">
              <select value={npcF.status} onChange={e => setNpcF(f => ({ ...f, status: e.target.value }))} style={{ ...inputStyle, background: "#1a0a0a" }}>
                {["alive","dead","unknown"].map(v => <option key={v} value={v}>{v}</option>)}
              </select>
            </Field>
            <Field label="Tags (comma-separated)"><input value={npcF.tags} onChange={e => setNpcF(f => ({ ...f, tags: e.target.value }))} placeholder="wizard, spy…" style={inputStyle} /></Field>
            <Field label="Description"><textarea value={npcF.description} onChange={e => setNpcF(f => ({ ...f, description: e.target.value }))} rows={3} style={{ ...inputStyle, resize: "vertical", width: "100%", boxSizing: "border-box" }} /></Field>
          </div>
          <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginTop: 20 }}>
            <Btn color="#6b7280" onClick={() => { setModal(null); setEditingNPCId(null); }}>Cancel</Btn>
            <Btn color="#4ade80" onClick={editingNPCId ? saveNPC : addNPC}>{editingNPCId ? "Save Changes" : "Add NPC"}</Btn>
          </div>
        </Modal>
      )}

      {modal === "loc" && (
        <Modal title={editingLocId ? "Edit Location" : "Add Location"} onClose={() => { setModal(null); setEditingLocId(null); }}>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 12 }}>
            <Field label="Location Name *"><input value={locF.name} onChange={e => setLocF(f => ({ ...f, name: e.target.value }))} style={inputStyle} /></Field>
            <Field label="Region">
              <select value={locF.category} onChange={e => setLocF(f => ({ ...f, category: e.target.value }))} style={{ ...inputStyle, background: "#1a0a0a" }}>
                {catOpts.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
              </select>
            </Field>
            <Field label="Color"><input type="color" value={locF.color} onChange={e => setLocF(f => ({ ...f, color: e.target.value }))} style={{ width: 48, height: 36, border: "none", borderRadius: 4, cursor: "pointer" }} /></Field>
          </div>
          <div style={{ display: "flex", justifyContent: "space-between", gap: 10, marginTop: 20 }}>
            <div>{editingLocId && <Btn color="#f87171" onClick={() => deleteLoc(editingLocId)}>🗑 Delete Location</Btn>}</div>
            <div style={{ display: "flex", gap: 10 }}>
              <Btn color="#6b7280" onClick={() => { setModal(null); setEditingLocId(null); }}>Cancel</Btn>
              <Btn color="#60a5fa" onClick={editingLocId ? saveLoc : addLoc}>{editingLocId ? "Save Changes" : "Add Location"}</Btn>
            </div>
          </div>
        </Modal>
      )}

      {modal === "cat" && (
        <Modal title={editingCatId ? "Edit Region" : "Add Region"} onClose={() => { setModal(null); setEditingCatId(null); }}>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 12, alignItems: "flex-end" }}>
            <Field label="Region Name *"><input value={catF.name} onChange={e => setCatF(f => ({ ...f, name: e.target.value }))} style={inputStyle} /></Field>
            <Field label="Domain">
              <select value={catF.domain} onChange={e => setCatF(f => ({ ...f, domain: e.target.value }))} style={{ ...inputStyle, background: "#1a0a0a" }}>
                {domains.map(d => <option key={d.id} value={d.id}>{d.name}</option>)}
              </select>
            </Field>
            <Field label="Color"><input type="color" value={catF.color} onChange={e => setCatF(f => ({ ...f, color: e.target.value }))} style={{ width: 48, height: 36, border: "none", borderRadius: 4, cursor: "pointer" }} /></Field>
          </div>
          <div style={{ display: "flex", justifyContent: "space-between", gap: 10, marginTop: 20 }}>
            <div>{editingCatId && <Btn color="#f87171" onClick={() => deleteCat(editingCatId)}>🗑 Delete Region</Btn>}</div>
            <div style={{ display: "flex", gap: 10 }}>
              <Btn color="#6b7280" onClick={() => { setModal(null); setEditingCatId(null); }}>Cancel</Btn>
              <Btn color="#c084fc" onClick={editingCatId ? saveCat : addCat}>{editingCatId ? "Save Changes" : "Add Region"}</Btn>
            </div>
          </div>
        </Modal>
      )}

      {modal === "rel" && (
        <Modal title="Add Relationship" onClose={() => setModal(null)}>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 12 }}>
            <Field label="From NPC">
              <select value={relF.from} onChange={e => setRelF(f => ({ ...f, from: e.target.value }))} style={{ ...inputStyle, background: "#1a0a0a" }}>
                <option value="">— select —</option>
                {npcOpts.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
              </select>
            </Field>
            <Field label="To NPC">
              <select value={relF.to} onChange={e => setRelF(f => ({ ...f, to: e.target.value }))} style={{ ...inputStyle, background: "#1a0a0a" }}>
                <option value="">— select —</option>
                {npcOpts.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
              </select>
            </Field>
            <Field label="Relationship Label"><input value={relF.label} onChange={e => setRelF(f => ({ ...f, label: e.target.value }))} placeholder="Father/Son, Spy, Ally…" style={inputStyle} /></Field>
          </div>
          <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginTop: 20 }}>
            <Btn color="#6b7280" onClick={() => setModal(null)}>Cancel</Btn>
            <Btn color="#b45309" onClick={addRel}>Add Relationship</Btn>
          </div>
        </Modal>
      )}

      {modal === "dom" && (
        <Modal title={editingDomId ? "Edit Domain" : "Add Domain"} onClose={() => { setModal(null); setEditingDomId(null); }}>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 12, alignItems: "flex-end" }}>
            <Field label="Domain Name *"><input value={domF.name} onChange={e => setDomF(f => ({ ...f, name: e.target.value }))} style={inputStyle} /></Field>
            <Field label="Darklord">
              <select value={domF.darklordId} onChange={e => setDomF(f => ({ ...f, darklordId: e.target.value }))} style={{ ...inputStyle, background: "#1a0a0a" }}>
                <option value="">— none —</option>
                {npcOpts.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
              </select>
            </Field>
            <Field label="Color"><input type="color" value={domF.color} onChange={e => setDomF(f => ({ ...f, color: e.target.value }))} style={{ width: 48, height: 36, border: "none", borderRadius: 4, cursor: "pointer" }} /></Field>
          </div>
          <div style={{ display: "flex", justifyContent: "space-between", gap: 10, marginTop: 20 }}>
            <div>{editingDomId && <Btn color="#f87171" onClick={() => deleteDom(editingDomId)}>🗑 Delete Domain</Btn>}</div>
            <div style={{ display: "flex", gap: 10 }}>
              <Btn color="#6b7280" onClick={() => { setModal(null); setEditingDomId(null); }}>Cancel</Btn>
              <Btn color="#f472b6" onClick={editingDomId ? saveDom : addDom}>{editingDomId ? "Save Changes" : "Add Domain"}</Btn>
            </div>
          </div>
        </Modal>
      )}

      {modal === "export" && (
        <Modal title="Export — Copy this JSON" onClose={() => setModal(null)}>
          <p style={{ fontSize: 12, color: "#9ca3af", margin: "0 0 12px" }}>
            Copy everything below and save it in a text file (e.g. <code style={{color:"#e8b87a"}}>npc-codex.json</code>). Use "Import JSON" to restore next time.
          </p>
          <textarea
            readOnly value={exportText} onClick={e => e.target.select()}
            style={{ ...inputStyle, width: "100%", minHeight: 220, resize: "vertical", boxSizing: "border-box", fontSize: 11, fontFamily: "monospace" }}
          />
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 14 }}>
            <button onClick={() => navigator.clipboard?.writeText(exportText)}
              style={{ background: "rgba(74,222,128,0.12)", border: "1px solid rgba(74,222,128,0.35)", color: "#4ade80", padding: "6px 16px", borderRadius: 4, fontSize: 13, cursor: "pointer" }}>
              📋 Copy to Clipboard
            </button>
            <Btn color="#6b7280" onClick={() => setModal(null)}>Close</Btn>
          </div>
        </Modal>
      )}

      {modal === "import_paste" && (
        <Modal title="Import — Paste JSON" onClose={() => { setModal(null); setExportText(""); }}>
          <p style={{ fontSize: 12, color: "#9ca3af", margin: "0 0 12px" }}>Paste your previously exported JSON here.</p>
          <textarea
            value={exportText} onChange={e => setExportText(e.target.value)}
            placeholder="Paste JSON here…"
            style={{ ...inputStyle, width: "100%", minHeight: 200, resize: "vertical", boxSizing: "border-box", fontSize: 11, fontFamily: "monospace" }}
          />
          <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginTop: 14 }}>
            <Btn color="#6b7280" onClick={() => { setModal(null); setExportText(""); }}>Cancel</Btn>
            <Btn color="#60a5fa" onClick={() => {
              try {
                const data = JSON.parse(exportText);
                if (data.npcs)          setNpcs(data.npcs);
                if (data.locations)     setLocations(data.locations);
                if (data.categories)    setCategories(data.categories);
                if (data.relationships) setRelationships(data.relationships);
                if (data.customStatus)  setCustomStatus(data.customStatus);
                if (data.notes)         setNotes(data.notes);
                if (data.darklordId)    setDarklordId(data.darklordId);
                if (data.domains)       setDomains(data.domains);
                setView("grid"); setModal(null); setExportText("");
              } catch { alert("Invalid JSON — check your text and try again."); }
            }}>Load Data</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
